            - heading "Transports" [level=3] [ref=e154]
            - paragraph [ref=e155]: MCP separates the protocol (what messages mean) from the transport (how they travel). Two transports are defined in the specification.
            - heading "stdio" [level=3] [ref=e156]
            - paragraph [ref=e157]:
              - text: The server runs as a child process. The host writes JSON-RPC messages to the server’s
              - strong [ref=e158]: stdin
              - text: and reads responses from
              - strong [ref=e159]: stdout
              - text: . Stderr is available for logs and diagnostics.
            - paragraph [ref=e160]: This is the transport used by Claude Desktop, VS Code Copilot Chat, and any other desktop AI host. It is simple, secure (no network exposure), and requires no port configuration. The server binary is launched and killed by the host — it has no independent lifetime outside that relationship.
            - paragraph [ref=e161]:
              - text: "The critical rule for stdio:"
              - strong [ref=e162]: stdout must contain only JSON-RPC messages
              - text: . Any log output, startup banners, or debug text written to stdout corrupts the message stream and breaks the session. In Part 3 we handle this by detecting a
              - code [ref=e163]: "--stdio"
              - text: flag at startup and suppressing all logging when it is set.
            - heading "HTTP with SSE (Server-Sent Events)" [level=3] [ref=e164]
            - paragraph [ref=e165]: The server runs as a persistent HTTP process. The client sends requests via HTTP POST and receives streaming responses over a persistent Server-Sent Events connection.
            - paragraph [ref=e166]:
              - text: This transport suits remote servers, shared team servers, and multi-client scenarios. It also enables interactive testing via the MCP Inspector — you point the inspector at
              - code [ref=e167]: http://localhost:5100/mcp
              - text: and call tools directly without any AI host involved.
            - paragraph [ref=e168]:
              - text: "In this series, we support both transports from the same binary:"
              - code [ref=e169]: dotnet run
              - text: starts HTTP mode,
              - code [ref=e170]: dotnet run -- --stdio
              - text: starts stdio mode.
