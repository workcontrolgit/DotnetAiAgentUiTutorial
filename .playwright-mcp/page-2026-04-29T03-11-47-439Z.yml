          - generic [ref=e94]:
            - heading "MCP Primitives" [level=3] [ref=e95]
            - paragraph [ref=e96]: MCP defines three building blocks that a server can expose to a client. Every capability maps to one of them.
            - heading "Tools" [level=3] [ref=e97]
            - paragraph [ref=e98]:
              - text: Tools are
              - strong [ref=e99]: functions the AI can call
              - text: . They take structured inputs, perform an action, and return a result. The AI decides when to call a tool based on conversation context; the server executes it and returns the output.
            - paragraph [ref=e100]:
              - text: In our project,
              - code [ref=e101]: GetOpenPositions
              - text: and
              - code [ref=e102]: WriteJobDescription
              - text: are tools. When a user asks "what federal jobs are available?", the AI calls
              - code [ref=e103]: GetOpenPositions
              - text: — the server queries the database and returns the positions. The AI never touches the database directly.
            - paragraph [ref=e104]:
              - text: Tools are the most-used MCP primitive. They are the
              - code [ref=e105]: .NET method
              - text: of the MCP world.
            - heading "Resources" [level=3] [ref=e106]
            - paragraph [ref=e107]:
              - text: Resources are
              - strong [ref=e108]: data the AI can read
              - text: ", identified by URIs. Unlike tools, resources are not invoked with arguments — they are fetched by address and return content: text, JSON, or binary."
            - paragraph [ref=e109]: "Think of resources as files or reference material the AI needs to understand context: a README, a schema definition, a policy document. They provide information; they do not perform actions."
            - heading "Prompts" [level=3] [ref=e110]
            - paragraph [ref=e111]:
              - text: Prompts are
              - strong [ref=e112]: reusable message templates
              - text: stored on the server. A client fetches a named prompt, fills in its parameters, and injects the result into a conversation.
            - paragraph [ref=e113]:
              - text: They are useful for encoding domain knowledge that should stay close to the data. For example, a
              - code [ref=e114]: job_description_template
              - text: prompt can carry OPM formatting rules and federal plain-language writing standards — every AI host that connects gets the same authoritative template without the host needing to know those rules itself.
