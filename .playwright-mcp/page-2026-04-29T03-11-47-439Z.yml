            - 'heading "Architecture: Host → Client → Server" [level=3] [ref=e118]'
            - figure "Type caption for image (optional)" [ref=e119]:
              - img [ref=e122]
            - paragraph [ref=e123]: MCP defines three roles in every interaction.
            - paragraph [ref=e124]:
              - strong [ref=e125]: Host
              - text: is the AI application the user interacts with — Claude Desktop, VS Code Copilot Chat, a custom .NET console agent. The host embeds one or more MCP clients and decides which tools to surface to the language model.
            - paragraph [ref=e126]:
              - strong [ref=e127]: Client
              - text: is a component inside the host that manages the connection to one MCP server. It handles session lifecycle, capability negotiation, and message routing. One host can hold multiple clients — one per server it connects to.
            - paragraph [ref=e128]:
              - strong [ref=e129]: Server
              - text: is the process that exposes tools, resources, and prompts. It does not know which host is calling it. It only speaks MCP.
            - paragraph [ref=e130]: "The flow for a single tool call:"
            - blockquote [ref=e131]:
              - strong [ref=e132]:
                - emphasis [ref=e133]: User
              - emphasis [ref=e134]: sends a message →
              - strong [ref=e135]:
                - emphasis [ref=e136]: Host
              - emphasis [ref=e137]: passes context to the
              - strong [ref=e138]:
                - emphasis [ref=e139]: LLM
              - emphasis [ref=e140]: → LLM decides to call a tool → Host routes the call through a
              - strong [ref=e141]:
                - emphasis [ref=e142]: Client
              - emphasis [ref=e143]: → Client sends a JSON-RPC request to the
              - strong [ref=e144]:
                - emphasis [ref=e145]: Server
              - emphasis [ref=e146]: → Server executes the tool → Server returns the result → Client delivers it to the Host → Host feeds it to the LLM → LLM generates the final response for the
              - strong [ref=e147]:
                - emphasis [ref=e148]: User
            - paragraph [ref=e149]:
              - text: "The critical insight:"
              - strong [ref=e150]: the LLM never calls the server directly
              - text: . The host mediates everything. The server has no knowledge of the conversation, the model, or the user — it only receives and responds to well-formed JSON-RPC messages.
