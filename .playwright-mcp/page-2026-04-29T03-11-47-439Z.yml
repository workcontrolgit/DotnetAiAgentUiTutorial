            - heading "What MCP Is" [level=3] [ref=e87]
            - paragraph [ref=e88]:
              - text: The
              - link "Model Context Protocol" [ref=e89]:
                - /url: https://medium.com/r/?url=https%3A%2F%2Fmodelcontextprotocol.io%2F
              - text: "is an open standard published by Anthropic in November 2024. It defines how AI applications connect to external data sources and tools: the message format, transport layer, capability negotiation, and session lifecycle for that connection."
            - paragraph [ref=e90]:
              - text: Think of it as
              - strong [ref=e91]: HTTP for AI tool use
              - text: — a universal contract that any host and any server can implement independently, without knowledge of each other’s internals.
        - generic [ref=e92]:
          - generic:
