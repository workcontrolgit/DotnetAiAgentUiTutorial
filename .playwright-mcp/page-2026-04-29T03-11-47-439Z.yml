            - heading "MCP vs Other Patterns" [level=3] [ref=e174]
            - paragraph [ref=e175]: MCP is not the first attempt to give AI models access to external capabilities.
            - paragraph [ref=e176]:
              - strong [ref=e177]: MCP vs Function Calling (OpenAI / Anthropic)
            - paragraph [ref=e178]: "Function calling is a model-level feature: you define functions in the API request and the model returns structured call arguments. It is tightly coupled to the API provider and the calling application. MCP is transport-level and provider-agnostic — the same MCP server works with Claude Desktop, VS Code, and any future MCP-compatible host without modification."
            - paragraph [ref=e179]:
              - strong [ref=e180]: MCP vs REST APIs
            - paragraph [ref=e181]: "A REST API requires the AI to know the URL structure, authentication scheme, request format, and error handling for each service. MCP presents a uniform interface: discover tools, call tools, read resources. No per-service knowledge is required in the host."
            - paragraph [ref=e182]:
              - strong [ref=e183]: MCP vs LangChain / Semantic Kernel Tools
            - paragraph [ref=e184]: Framework-specific tool definitions are coupled to the framework. A tool written for Semantic Kernel does not work in LangChain without a rewrite. An MCP server is framework-agnostic — any MCP-compatible host can call it, regardless of what AI framework it uses internally.
            - paragraph [ref=e185]:
              - strong [ref=e186]: MCP vs ChatGPT Plugins
            - paragraph [ref=e187]: ChatGPT Plugins were OpenAI-specific and required a public HTTP endpoint with a registered manifest. MCP supports local stdio transport (no network exposure, no public URL), works with multiple hosts, and is a vendor-neutral open standard with a published specification.
            - paragraph [ref=e188]:
              - text: "The common thread:"
              - strong [ref=e189]: MCP is a protocol, not a framework or an API
              - text: . Like HTTP, it outlives any individual implementation.
