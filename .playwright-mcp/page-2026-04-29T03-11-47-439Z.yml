            - heading "Introduction" [level=3] [ref=e56]
            - paragraph [ref=e57]: In Part 1 we built a federal HR domain with Clean Architecture. The data is structured, the services are in place, and the application compiles cleanly. But an AI cannot reach any of it yet.
            - paragraph [ref=e58]: "That is what Model Context Protocol (MCP) is for. Before we write a single line of MCP code in Part 3, this post builds the mental model: what problem MCP solves, how it works, and why it matters specifically for .NET developers."
            - paragraph [ref=e59]: No code in this post. Only concepts.
        - generic [ref=e60]:
          - generic:
            - separator: ...
          - generic [ref=e62]:
            - heading "The N×M Integration Problem" [level=3] [ref=e63]
            - paragraph [ref=e64]: Every AI application needs to reach external data. Before MCP, that meant writing a custom integration for each combination of AI host and data source.
            - paragraph [ref=e65]: "Imagine you have:"
            - list [ref=e66]:
              - listitem [ref=e67]:
                - text: •
                - strong [ref=e68]: N AI hosts
                - text: — Claude Desktop, a VS Code extension, a custom chatbot, a Slack bot
              - listitem [ref=e69]:
                - text: •
                - strong [ref=e70]: M data sources
                - text: — a SQL database, a REST API, a file system, a third-party SaaS
            - paragraph [ref=e71]:
              - text: Without a standard protocol, you need
              - strong [ref=e72]: N × M custom integrations
              - text: . Four hosts × four sources =
              - strong [ref=e73]: 16 separate integrations
              - text: "to build, maintain, and keep synchronized as both sides evolve. Each integration speaks a different language: some REST, some SDK-specific, some bespoke. A change to one data source breaks some integrations but not others. Security policies are inconsistent. Testing coverage is incomplete."
            - paragraph [ref=e74]:
              - text: MCP collapses N×M down to
              - strong [ref=e75]: N + M
              - text: ":"
            - list [ref=e76]:
              - listitem [ref=e77]:
                - text: • Each AI host implements the MCP
                - strong [ref=e78]: client
                - text: once
              - listitem [ref=e79]:
                - text: • Each data source implements the MCP
                - strong [ref=e80]: server
                - text: once
              - listitem [ref=e81]: • Any client connects to any server through the shared protocol
            - paragraph [ref=e82]:
              - text: Four hosts + four sources =
              - strong [ref=e83]: 8 implementations
              - text: instead of 16. And as the ecosystem grows, you add one server — every existing host can use it immediately, without changes on either side.
        - generic [ref=e84]:
