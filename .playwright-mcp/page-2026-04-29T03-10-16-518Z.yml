          - generic [ref=e71]:
            - heading "Why Clean Architecture for AI-Enabled Apps?" [level=3] [ref=e72]
            - paragraph [ref=e73]:
              - text: "Traditional layered apps put the database at the bottom and business logic in the middle. When you add AI, you need to invert that thinking: the"
              - strong [ref=e74]: domain model becomes the contract that the AI calls through
              - text: — whether via function calling, tool use, or MCP.
            - paragraph [ref=e75]:
              - text: Clean Architecture enforces this by making the
              - strong [ref=e76]: Core
              - text: (domain + application) independent of any infrastructure, including databases
              - emphasis [ref=e77]: and
              - text: "AI runtimes. That separation means:"
            - list [ref=e78]:
              - listitem [ref=e79]: • You can swap Ollama for Claude API without touching business logic
              - listitem [ref=e80]: • MCP tools are thin wrappers over Application services — no domain logic leaks in
              - listitem [ref=e81]: • Unit-testing use cases requires no database, no AI runtime, no HTTP server
            - paragraph [ref=e82]: "Here is how the layers relate in this project:"
            - figure "Type caption for image (optional)" [ref=e83]:
              - img [ref=e86]
            - paragraph [ref=e87]:
              - strong [ref=e88]: "Key rule:"
              - text: AI infrastructure (Ollama client, MCP SDK) lives only in the outermost projects. Core and Application have zero knowledge of AI.
