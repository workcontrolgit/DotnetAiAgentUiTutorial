            - paragraph [ref=e458]:
              - text: Reads credentials from user secrets, calls the Search API, maps
              - code [ref=e459]: MatchedObjectDescriptor
              - text: fields to the domain model schema, and writes
              - code [ref=e460]: data/usajobs-seed.json
              - text: "to the solution root:"
            - generic [ref=e461]:
              - generic [ref=e462]:
                - text: // tools/UsaJobsFetcher/Program.cs
                - text: "// One-time tool: fetches real federal job postings from the USAJobs API"
                - text: // and writes data/usajobs-seed.json to the solution root.
                - text: //
                - text: "// Store credentials via .NET User Secrets (never commit them):"
                - text: // dotnet user-secrets set "UsaJobs:Email" "your@email.com" --project tools/UsaJobsFetcher
                - text: // dotnet user-secrets set "UsaJobs:AuthKey" "your-key-here" --project tools/UsaJobsFetcher
                - text: //
                - text: "// Then run from the solution root:"
                - text: // dotnet run --project tools/UsaJobsFetcher
                - text: //
                - text: "// Output: data/usajobs-seed.json — commit this file so readers don't need an API key."
                - text: using Microsoft.Extensions.Configuration;
                - text: using System.Text.Json;
                - text: using System.Text.Json.Serialization;
                - text: var config = new ConfigurationBuilder()
                - text: .AddUserSecrets("usajobs-fetcher")
                - text: .Build();
                - text: var email = config["UsaJobs:Email"] ?? throw new InvalidOperationException("UsaJobs:Email secret is not set.");
                - text: var authKey = config["UsaJobs:AuthKey"] ?? throw new InvalidOperationException("UsaJobs:AuthKey secret is not set.");
                - text: // ── call USAJobs Search API ───────────────────────────────────────────────────
                - text: using var http = new HttpClient();
                - text: http.DefaultRequestHeaders.TryAddWithoutValidation("User-Agent", email);
                - text: http.DefaultRequestHeaders.Add("Authorization-Key", authKey);
                - text: // Change Organization= to broaden beyond DHS (remove it entirely for all agencies)
                - text: const string url =
                - text: "\"https://data.usajobs.gov/api/search\" +"
                - text: "\"?ResultsPerPage=25\" +"
                - text: "\"&Organization=HS\"; // HS = Department of Homeland Security"
                - text: "Console.WriteLine($\"Fetching: {url}\");"
                - text: var responseJson = await http.GetStringAsync(url);
                - text: // ── parse ─────────────────────────────────────────────────────────────────────
                - text: "var parseOpts = new JsonSerializerOptions { PropertyNameCaseInsensitive = true };"
                - text: var root = JsonSerializer.Deserialize<SearchRoot>(responseJson, parseOpts)!;
                - text: var items = root.SearchResult.SearchResultItems;
                - text: "Console.WriteLine($\"Received {items.Count} positions\");"
                - text: // ── map to seed model ─────────────────────────────────────────────────────────
                - text: var orgs = new Dictionary<string, SeedOrg>(StringComparer.OrdinalIgnoreCase);
                - text: var positions = new List<SeedPosition>();
                - text: foreach (var item in items)
                - text: "{"
                - text: var d = item.MatchedObjectDescriptor;
                - text: if (d is null) continue;
                - text: var orgName = d.OrganizationName ?? "Unknown Agency";
                - text: var deptName = d.DepartmentName ?? "Unknown Department";
                - text: orgs.TryAdd(orgName, new SeedOrg(orgName, deptName, ""));
                - text: var det = d.UserArea?.Details;
                - text: var rem = d.PositionRemuneration?.FirstOrDefault();
                - text: var plan = d.JobGrade?.FirstOrDefault()?.Code ?? "GS";
                - text: var lo = det?.LowGrade;
                - text: var hi = det?.HighGrade;
                - text: var isOpen = DateTime.TryParse(d.ApplicationCloseDate, out var close)
                - text: "&& close >= DateTime.UtcNow;"
                - text: positions.Add(new SeedPosition(
                - text: "Title: d.PositionTitle ?? \"\","
                - text: "Description: det?.JobSummary ?? \"\","
                - text: "Duties: det?.MajorDuties is { Count: > 0 }"
                - text: "? string.Join(\" \", det.MajorDuties)"
                - text: ": \"\","
                - text: "Qualifications: det?.Requirements ?? \"\","
                - text: "IsOpen: isOpen,"
                - text: "OccupationalSeries: d.JobCategory?.FirstOrDefault()?.Code ?? \"\","
                - text: "PayGradeMin: lo is not null ? $\"{plan}-{lo.PadLeft(2, '0')}\" : \"\","
                - text: "PayGradeMax: hi is not null ? $\"{plan}-{hi.PadLeft(2, '0')}\" : \"\","
                - text: "AppointmentType: MapAppointment(d.PositionAppointmentType?.FirstOrDefault()?.Name),"
                - text: "WorkSchedule: MapSchedule(d.PositionSchedule?.FirstOrDefault()?.Name),"
                - text: "OpenDate: d.PositionStartDate ?? DateTime.UtcNow.ToString(\"O\"),"
                - text: "CloseDate: d.ApplicationCloseDate,"
                - text: "WhoMayApply: det?.WhoMayApply?.Name ?? \"Open to US Citizens\","
                - text: "DutyLocation: d.PositionLocation?.FirstOrDefault()?.CityName ?? \"\","
                - text: "TeleworkEligible: det?.TeleworkEligible ?? false,"
                - text: "TravelRequired: MapTravel(det?.TravelCode),"
                - text: "SecurityClearance: MapClearance(det?.SecurityClearance),"
                - text: "SupervisoryStatus: \"Yes\".Equals(det?.SupervisoryPosition, StringComparison.OrdinalIgnoreCase),"
                - text: RelocationAuthorized:"Yes".Equals(det?.Relocation, StringComparison.OrdinalIgnoreCase),
                - text: "DrugTestRequired: \"Yes\".Equals(det?.DrugTestRequired, StringComparison.OrdinalIgnoreCase),"
                - text: "OrganizationName: orgName,"
                - text: "MinimumRange: decimal.TryParse(rem?.MinimumRange, out var mn) ? mn : 0,"
                - text: "MaximumRange: decimal.TryParse(rem?.MaximumRange, out var mx) ? mx : 0,"
                - text: "RateIntervalCode: rem?.RateIntervalCode ?? \"PA\""
                - text: ));
                - text: "}"
                - text: // ── write data/usajobs-seed.json ──────────────────────────────────────────────
                - text: var outPath = Path.Combine(Directory.GetCurrentDirectory(), "data", "usajobs-seed.json");
                - text: Directory.CreateDirectory(Path.GetDirectoryName(outPath)!);
                - text: var writeOpts = new JsonSerializerOptions
                - text: "{"
                - text: WriteIndented = true,
                - text: PropertyNamingPolicy = JsonNamingPolicy.CamelCase,
                - text: DefaultIgnoreCondition = JsonIgnoreCondition.WhenWritingNull
                - text: "};"
                - text: var seed = new SeedFile(orgs.Values.ToList(), positions);
                - text: await File.WriteAllTextAsync(outPath, JsonSerializer.Serialize(seed, writeOpts));
                - text: "Console.WriteLine($\"Wrote {positions.Count} positions from {orgs.Count} organizations\");"
                - text: "Console.WriteLine($\"Output: {outPath}\");"
                - text: return 0;
                - text: // ── string → enum label helpers ───────────────────────────────────────────────
                - text: static string MapAppointment(string? name) => name?.ToLower() switch
                - text: "{"
                - text: "{ } s when s.Contains(\"perm\") => \"Permanent\","
                - text: "{ } s when s.Contains(\"term\") => \"Term\","
                - text: _ => "Temporary"
                - text: "};"
                - text: static string MapSchedule(string? name) => name?.ToLower() switch
                - text: "{"
                - text: "{ } s when s.Contains(\"full\") => \"FullTime\","
                - text: "{ } s when s.Contains(\"part\") => \"PartTime\","
                - text: "{ } s when s.Contains(\"intermittent\") => \"Intermittent\","
                - text: _ => "FullTime"
                - text: "};"
                - text: static string MapTravel(string? code) => code switch
                - text: "{"
                - text: "\"1\" => \"NotRequired\","
                - text: "\"2\" => \"Occasional\","
                - text: "\"3\" => \"Sometimes\","
                - text: "\"4\" => \"Frequent\","
                - text: _ => "NotRequired"
                - text: "};"
                - text: static string MapClearance(string? s) => s?.ToLower() switch
                - text: "{"
                - text: "{ } v when v.Contains(\"ts/sci\") || v.Contains(\"top secret/sci\") => \"TopSecretSCI\","
                - text: "{ } v when v.Contains(\"top secret\") => \"TopSecret\","
                - text: "{ } v when v.Contains(\"secret\") => \"Secret\","
                - text: "{ } v when v.Contains(\"confidential\") => \"Confidential\","
                - text: "{ } v when v.Contains(\"public trust\") => \"PublicTrust\","
                - text: _ => "NotRequired"
                - text: "};"
                - text: // ── USAJobs API response types ────────────────────────────────────────────────
                - text: record SearchRoot(SearchResult SearchResult);
                - text: record SearchResult(int SearchResultCount, List<SearchResultItem> SearchResultItems);
                - text: record SearchResultItem(MatchedObjectDescriptor? MatchedObjectDescriptor);
                - text: record MatchedObjectDescriptor(
                - text: string? PositionTitle,
                - text: string? OrganizationName,
                - text: string? DepartmentName,
                - text: string? PositionStartDate,
                - text: string? ApplicationCloseDate,
                - text: List<PositionLocation>? PositionLocation,
                - text: List<JobCategory>? JobCategory,
                - text: List<JobGrade>? JobGrade,
                - text: List<PositionSchedule>? PositionSchedule,
                - text: List<PositionAppointmentType>? PositionAppointmentType,
                - text: List<PositionRemuneration>? PositionRemuneration,
                - text: UserArea? UserArea);
                - text: record PositionLocation(string? CityName, string? CountrySubDivisionCode);
                - text: record JobCategory(string? Name, string? Code);
                - text: record JobGrade(string? Code);
                - text: record PositionSchedule(string? Name, string? Code);
                - text: record PositionAppointmentType(string? Name, string? Code);
                - text: record PositionRemuneration(string? MinimumRange, string? MaximumRange, string? RateIntervalCode);
                - text: record UserArea(UserAreaDetails? Details);
                - text: record UserAreaDetails(
