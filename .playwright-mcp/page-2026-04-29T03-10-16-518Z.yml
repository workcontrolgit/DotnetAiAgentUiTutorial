            - heading "Introduction" [level=3] [ref=e56]
            - paragraph [ref=e57]:
              - text: Before we wire up AI agents and MCP servers, we need solid ground to stand on. In this first post, we build the Clean Architecture foundation — a federal HR domain modeled after
              - link "USAJobs.gov" [ref=e58]:
                - /url: https://medium.com/r/?url=http%3A%2F%2Fusajobs.gov%2F
                - strong [ref=e59]: USAJobs.gov
              - text: ", the official US federal government job board."
            - paragraph [ref=e60]: Why USAJobs? Federal job announcements have a richer, more structured data model than commercial job boards. They require occupational series codes, GS pay grades, security clearance levels, duty locations, open/close application windows, and OPM-standard qualifications text. That richness gives our AI agent meaningful context when generating job postings in Parts 3 and 4.
            - paragraph [ref=e61]: "By the end of this post you will have:"
            - list [ref=e62]:
              - listitem [ref=e63]: • A .NET 10 solution with 5 projects wired together correctly
              - listitem [ref=e64]:
                - text: • A domain model with entity and field names aligned to the
                - link "USAJobs API schema" [ref=e65]:
                  - /url: https://medium.com/r/?url=https%3A%2F%2Fdeveloper.usajobs.gov%2Fapi-reference%2F
              - listitem [ref=e66]: • Application services the MCP tools will call in Part 3
              - listitem [ref=e67]: • EF Core + SQL Server 2025 LocalDB with an initial migration
              - listitem [ref=e68]: • 4 federal hiring organizations and 5 realistic USAJobs-format positions seeded and ready to query
        - generic [ref=e69]:
