                - text: string? Requirements,
                - text: List<string>? MajorDuties,
                - text: string? Relocation,
                - text: string? DrugTestRequired,
                - text: bool? TeleworkEligible,
                - text: string? SupervisoryPosition,
                - text: string? SecurityClearance,
                - text: string? TravelCode);
                - text: record WhoMayApply(string? Name, string? Code);
                - text: // ── seed file model ───────────────────────────────────────────────────────────
                - text: record SeedFile(List<SeedOrg> Organizations, List<SeedPosition> Positions);
                - text: record SeedOrg(string OrganizationName, string DepartmentName, string AgencyDescription);
                - text: record SeedPosition(
                - text: string Title,
                - text: string Description,
                - text: string Duties,
                - text: string Qualifications,
