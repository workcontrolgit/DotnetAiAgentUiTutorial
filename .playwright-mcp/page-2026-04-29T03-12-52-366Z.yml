            - heading "How stdio Transport Works with Claude Desktop" [level=3] [ref=e70]
            - paragraph [ref=e71]: When Claude Desktop launches an MCP server it does not connect over HTTP. It spawns the server as a child process and communicates over stdin/stdout using JSON-RPC 2.0. This is the stdio transport.
            - figure "Type caption for image (optional)" [ref=e72]:
              - img [ref=e75]
            - paragraph [ref=e76]: "Two rules follow from this architecture:"
            - list [ref=e77]:
              - listitem [ref=e78]:
                - text: •
                - strong [ref=e79]: stdout must be clean.
                - text: Every byte written to stdout is treated as a JSON-RPC message. Any log line, startup banner, or debug output written to stdout will corrupt the protocol stream. This is why the
                - code [ref=e80]: "--stdio"
                - text: flag clears all log providers and redirects them to stderr.
              - listitem [ref=e81]:
                - text: •
                - strong [ref=e82]: No HTTP listener.
                - text: In stdio mode the server does not bind a port.
                - code [ref=e83]: builder.WebHost.UseUrls()
                - text: with no argument prevents
                - link "ASP.NET" [ref=e84]:
                  - /url: https://medium.com/r/?url=http%3A%2F%2Fasp.net%2F
                - text: Core from trying to listen on any address.
            - paragraph [ref=e85]:
              - text: Both are already handled in
              - code [ref=e86]: McpServer/Program.cs
              - text: "from Part 3:"
            - generic [ref=e87]:
              - generic [ref=e88]:
                - text: if (isStdio)
                - text: "{"
                - text: builder.Logging.ClearProviders();
                - text: builder.Logging.AddConsole(o => o.LogToStandardErrorThreshold = LogLevel.Trace);
                - text: builder.WebHost.UseUrls(); // no HTTP listener
                - text: "}"
              - generic:
                - text: Auto (SCSS)
                - generic:
                  - img
