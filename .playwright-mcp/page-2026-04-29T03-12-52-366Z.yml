            - paragraph [ref=e216]: If the tools appear and work in MCP Inspector, the server is healthy. Any problem is in the Claude Desktop stdio transport or configuration — not in the tool logic. This isolates the failure domain immediately.
            - heading "Common problems" [level=3] [ref=e217]
            - paragraph [ref=e218]:
              - strong [ref=e219]: Tools not showing in Claude Desktop (no hammer icon)
            - list [ref=e220]:
              - listitem [ref=e221]:
                - text: • The most likely cause is a wrong path in
                - code [ref=e222]: claude_desktop_config.json
                - text: . Verify the path to the
                - code [ref=e223]: .exe
                - text: is correct and the file exists at that location.
              - listitem [ref=e224]: • Claude Desktop was not fully quit and relaunched. Use the system tray Quit option, not just the window close button.
              - listitem [ref=e225]: • The config file has a JSON syntax error. Validate it with a JSON linter.
            - paragraph [ref=e226]:
              - strong [ref=e227]: Hammer icon present but tools fail silently
            - list [ref=e228]:
              - listitem [ref=e229]:
                - text: • SQL Server is not running or the connection string is wrong. Start SQL Server and verify the
                - code [ref=e230]: DefaultConnection
                - text: in
                - code [ref=e231]: appsettings.json
                - text: .
              - listitem [ref=e232]:
                - text: • The database has not been migrated. Run
                - code [ref=e233]: dotnet ef database update --project src/HrMcp.McpServer
                - text: once manually.
            - paragraph [ref=e234]:
              - strong [ref=e235]: Garbled output / JSON parse errors in Claude Desktop
            - list [ref=e236]:
              - listitem [ref=e237]:
                - text: • stdout contamination. Something is writing to stdout in stdio mode. Check that
                - code [ref=e238]: "--stdio"
                - text: is in the
                - code [ref=e239]: args
                - text: array in the config and that
                - code [ref=e240]: Program.cs
                - text: is clearing log providers when
                - code [ref=e241]: isStdio
                - text: is true.
              - listitem [ref=e242]:
                - text: • A third-party NuGet package may be writing to stdout during startup. Add
                - code [ref=e243]: Console.SetOut(TextWriter.Null)
                - text: as a last resort after
