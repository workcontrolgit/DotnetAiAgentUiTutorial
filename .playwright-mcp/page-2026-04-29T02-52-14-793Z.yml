            - heading "Introduction" [level=2] [ref=e337]
            - paragraph [ref=e338]:
              - text: The MCP server we built in Parts 3–5 listens on
              - code [ref=e339]: http://localhost:5100/mcp
              - text: with no authentication. On a developer laptop that is fine — nothing reaches the port except local processes. But the moment you deploy the server to a shared environment, a container, or a cloud VM, any process that can reach the network can call your HR tools, read position data, and trigger AI generation at your cost.
            - paragraph [ref=e340]:
              - text: This part adds JWT Bearer authentication using OpenID Connect (OIDC). The pattern is standard
              - link "ASP.NET" [ref=e341] [cursor=pointer]:
                - /url: http://asp.net/
              - text: "Core:"
            - list [ref=e342]:
              - listitem [ref=e343]:
                - text: The MCP server becomes a
                - strong [ref=e344]: resource server
                - text: — it validates JWT tokens on every request.
              - listitem [ref=e345]:
                - text: The agent (or any client) becomes an
                - strong [ref=e346]: OAuth2 client
                - text: — it acquires a token via the client credentials flow before connecting.
              - listitem [ref=e347]:
                - text: An external
                - strong [ref=e348]: OIDC provider
                - text: issues and validates tokens.
            - paragraph [ref=e349]:
              - text: The working example uses
              - strong [ref=e350]: Duende IdentityServer
              - text: running in Docker — a self-hosted .NET identity server you control completely. Because the code speaks standard OIDC, swapping to a cloud provider (Okta, Azure Entra ID, Google) requires only two config values. That swap is covered at the end of this part.
            - paragraph [ref=e351]:
              - text: "The surface area of change is small: four lines in"
              - code [ref=e352]: Program.cs
              - text: ", two values in"
              - code [ref=e353]: appsettings.Development.json
              - text: ", and token acquisition in the agent."
          - separator [ref=e354]
          - generic [ref=e360]:
            - heading "Architecture" [level=2] [ref=e361]
            - figure [ref=e362]:
              - button "Press enter or click to view image in full size" [ref=e363]:
                - generic [ref=e364]: Press enter or click to view image in full size
            - paragraph [ref=e367]: The OIDC provider is the only component that changes between deployments. The server and agent code are provider-agnostic — they speak standard JWT Bearer and OAuth2 client credentials.
          - separator [ref=e368]
          - generic [ref=e374]:
            - heading "Provider Options" [level=2] [ref=e375]
            - paragraph [ref=e376]: Any standards-compliant OIDC provider works. This part uses Duende IdentityServer because it runs locally in Docker with no external accounts or network dependencies.
            - list [ref=e377]:
              - listitem [ref=e378]:
                - strong [ref=e379]: Duende IdentityServer
                - text: — open-source .NET identity server; runs in Docker; full control over clients, scopes, and users; free community license for development; production license required for revenue-generating use. This is the provider used in this walkthrough.
              - listitem [ref=e380]:
                - strong [ref=e381]: Okta
                - text: — free developer account supports up to 1,000 monthly active users; well-documented client credentials setup; hosted, no infrastructure required.
              - listitem [ref=e382]:
                - strong [ref=e383]: Azure Entra ID (formerly Azure AD)
                - text: — use App Registrations with a client secret; integrates with MSAL and Azure RBAC; free tier available in Azure portal.
              - listitem [ref=e384]:
                - strong [ref=e385]: Google Cloud Identity Platform
                - text: — OAuth2 service accounts support client credentials; configure via Google Cloud Console.
