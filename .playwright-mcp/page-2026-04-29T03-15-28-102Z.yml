              - text: ", the official US federal government job board, which gives us a rich, structured data model to work with: occupational series codes, GS pay grades, security clearance levels, hiring organizations, and OPM-standard qualifications text."
            - paragraph [ref=e84]: "The final system looks like this:"
            - figure "Type caption for image (optional)" [ref=e85]:
