            - heading "Your .NET Skills Are Your AI Superpower" [level=3] [ref=e58]
            - paragraph [ref=e59]:
              - text: You already know C#. You already know dependency injection, EF Core,
              - link "ASP.NET" [ref=e60]:
                - /url: https://medium.com/r/?url=http%3A%2F%2Fasp.net%2F
              - text: Core, and Clean Architecture. You know how to build APIs that are fast, maintainable, and production-ready.
            - paragraph [ref=e61]: That foundation is exactly what AI integration requires — and most tutorials skip over it entirely.
            - paragraph [ref=e62]: "This series is different. We start where you are: a .NET developer with solid backend skills but little exposure to AI agents or the Model Context Protocol. By the end, you will have built a fully working AI-enabled backend from scratch — every line of code explained, every design decision justified, every tool tested."
            - paragraph [ref=e63]: No Python. No black boxes. No hand-waving.
        - generic [ref=e64]:
