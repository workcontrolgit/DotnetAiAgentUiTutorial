          - generic [ref=e66]:
            - heading "The Shift Happening Right Now" [level=3] [ref=e67]
            - paragraph [ref=e68]: "AI assistants are moving from chat windows into professional workflows. Tools like Claude Desktop, VS Code Copilot, and custom enterprise agents are being asked to do real work: query databases, generate documents, apply business rules, call APIs."
            - paragraph [ref=e69]: For that to happen, AI needs a way to reach your application’s data and logic. The old approach was to build a custom integration for each AI tool and each data source. That approach does not scale.
            - paragraph [ref=e70]:
              - strong [ref=e71]: Model Context Protocol (MCP)
              - text: is the standard that replaces it.
            - figure "Type caption for image (optional)" [ref=e72]:
              - img [ref=e75]
            - paragraph [ref=e76]: "MCP is to AI integration what REST was to web APIs in 2005: a shared contract that lets both sides evolve independently. Learning it now puts you ahead of the transition, not behind it."
