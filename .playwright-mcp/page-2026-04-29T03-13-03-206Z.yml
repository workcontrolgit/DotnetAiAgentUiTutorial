            - heading "Provider Options" [level=3] [ref=e85]
            - paragraph [ref=e86]: Any standards-compliant OIDC provider works. This part uses Duende IdentityServer because it runs locally in Docker with no external accounts or network dependencies.
            - list [ref=e87]:
              - listitem [ref=e88]:
                - text: •
                - strong [ref=e89]: Duende IdentityServer
                - text: — open-source .NET identity server; runs in Docker; full control over clients, scopes, and users; free community license for development; production license required for revenue-generating use. This is the provider used in this walkthrough.
              - listitem [ref=e90]:
                - text: •
                - strong [ref=e91]: Okta
                - text: — free developer account supports up to 1,000 monthly active users; well-documented client credentials setup; hosted, no infrastructure required.
              - listitem [ref=e92]:
                - text: •
                - strong [ref=e93]: Azure Entra ID (formerly Azure AD)
                - text: — use App Registrations with a client secret; integrates with MSAL and Azure RBAC; free tier available in Azure portal.
              - listitem [ref=e94]:
                - text: •
                - strong [ref=e95]: Google Cloud Identity Platform
                - text: — OAuth2 service accounts support client credentials; configure via Google Cloud Console.
