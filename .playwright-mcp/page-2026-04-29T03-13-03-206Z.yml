          - generic [ref=e55]:
            - heading "Introduction" [level=3] [ref=e56]
            - paragraph [ref=e57]:
              - text: The MCP server we built in Parts 3–5 listens on
              - code [ref=e58]: http://localhost:5100/mcp
              - text: with no authentication. On a developer laptop that is fine — nothing reaches the port except local processes. But the moment you deploy the server to a shared environment, a container, or a cloud VM, any process that can reach the network can call your HR tools, read position data, and trigger AI generation at your cost.
            - paragraph [ref=e59]:
              - text: This part adds JWT Bearer authentication using OpenID Connect (OIDC). The pattern is standard
              - link "ASP.NET" [ref=e60]:
                - /url: https://medium.com/r/?url=http%3A%2F%2Fasp.net%2F
              - text: "Core:"
            - list [ref=e61]:
              - listitem [ref=e62]:
                - text: • The MCP server becomes a
                - strong [ref=e63]: resource server
                - text: — it validates JWT tokens on every request.
              - listitem [ref=e64]:
                - text: • The agent (or any client) becomes an
                - strong [ref=e65]: OAuth2 client
                - text: — it acquires a token via the client credentials flow before connecting.
              - listitem [ref=e66]:
                - text: • An external
                - strong [ref=e67]: OIDC provider
                - text: issues and validates tokens.
            - paragraph [ref=e68]:
              - text: The working example uses
              - strong [ref=e69]: Duende IdentityServer
              - text: running in Docker — a self-hosted .NET identity server you control completely. Because the code speaks standard OIDC, swapping to a cloud provider (Okta, Azure Entra ID, Google) requires only two config values. That swap is covered at the end of this part.
            - paragraph [ref=e70]:
              - text: "The surface area of change is small: four lines in"
              - code [ref=e71]: Program.cs
              - text: ", two values in"
              - code [ref=e72]: appsettings.Development.json
              - text: ", and token acquisition in the agent."
        - generic [ref=e73]:
          - generic:
            - separator: ...
          - generic [ref=e75]:
            - heading "Architecture" [level=3] [ref=e76]
            - figure "Type caption for image (optional)" [ref=e77]:
              - img [ref=e80]
            - paragraph [ref=e81]: The OIDC provider is the only component that changes between deployments. The server and agent code are provider-agnostic — they speak standard JWT Bearer and OAuth2 client credentials.
        - generic [ref=e82]:
