            - paragraph [ref=e108]: "A few design notes:"
            - list [ref=e109]:
              - listitem [ref=e110]:
                - text: •
                - strong [ref=e111]: Return anonymous projections, not entities.
                - text: Domain entities have navigation properties that create circular references and bloat JSON. Project only the fields the AI needs.
              - listitem [ref=e112]:
                - text: •
                - strong [ref=e113]: Enums as strings.
                - code [ref=e114]: p.SecurityClearance.ToString()
                - text: gives the AI
                - code [ref=e115]: "\"Secret\""
                - text: instead of
                - code [ref=e116]: "3"
                - text: . Self-explanatory values require no schema lookup.
              - listitem [ref=e117]:
                - text: •
                - code [ref=e118]:
                  - strong [ref=e119]: CancellationToken
                - strong [ref=e120]: as the last parameter.
                - text: The SDK passes the request cancellation token automatically when a method accepts it. Always include it for async tools.
