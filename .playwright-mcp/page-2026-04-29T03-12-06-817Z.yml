            - paragraph [ref=e139]:
              - text: The updated
              - code [ref=e140]: Program.cs
              - text: handles both transports from a single binary. The
              - code [ref=e141]: "--stdio"
              - text: flag switches the server into stdio mode, which is required by Claude Desktop and VS Code Copilot Chat.
            - generic [ref=e142]:
              - generic [ref=e143]:
                - text: // src/HrMcp.McpServer/Program.cs
                - text: using HrMcp.Application.Services;
                - text: using HrMcp.Infrastructure.Persistence;
                - text: using HrMcp.McpServer.Tools;
                - text: using Microsoft.EntityFrameworkCore;
                - text: var isStdio = args.Contains("--stdio");
                - text: var builder = WebApplication.CreateBuilder(args);
                - text: // Stdout must contain only JSON-RPC when running as a stdio server.
                - text: // Clear all log providers so nothing leaks into stdout.
                - text: if (isStdio)
                - text: "{"
                - text: builder.Logging.ClearProviders();
                - text: builder.Logging.AddConsole(o => o.LogToStandardErrorThreshold = Microsoft.Extensions.Logging.LogLevel.Trace);
                - text: builder.WebHost.UseUrls(); // no HTTP listener in stdio mode
                - text: "}"
                - text: builder.Services.AddPersistence(
                - text: builder.Configuration.GetConnectionString("DefaultConnection")!);
                - text: builder.Services.AddScoped<PositionService>();
                - text: builder.Services.AddScoped<HiringOrganizationService>();
                - text: var mcp = builder.Services
                - text: .AddMcpServer()
                - text: .WithTools<PositionTools>()
                - text: .WithTools<HiringOrganizationTools>()
                - text: .WithTools<JobDescriptionTools>();
                - text: if (isStdio)
                - text: mcp.WithStdioServerTransport();
                - text: else
                - text: mcp.WithHttpTransport();
                - text: var app = builder.Build();
                - text: using (var scope = app.Services.CreateScope())
                - text: "{"
                - text: var db = scope.ServiceProvider.GetRequiredService<HrDbContext>();
                - text: db.Database.Migrate();
                - text: // Looks for data/usajobs-seed.json in the working directory (solution root when using dotnet run)
                - text: var seedPath = Path.Combine(Directory.GetCurrentDirectory(), "data", "usajobs-seed.json");
                - text: DbSeeder.Seed(db, seedPath);
                - text: "}"
                - text: if (!isStdio)
                - text: app.MapMcp("/mcp");
                - text: await app.RunAsync();
