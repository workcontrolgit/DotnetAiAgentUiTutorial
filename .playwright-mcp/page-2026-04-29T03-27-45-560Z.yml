              - generic:
                - text: Auto (CSS)
                - generic:
                  - img
            - paragraph [ref=e219]: If the tools appear and work in MCP Inspector, the server is healthy. Any problem is in the Claude Desktop stdio transport or configuration — not in the tool logic. This isolates the failure domain immediately.
            - heading "Common problems" [level=3] [ref=e220]
            - paragraph [ref=e221]:
              - strong [ref=e222]: Tools not showing in Claude Desktop (no hammer icon)
            - list [ref=e223]:
              - listitem [ref=e224]:
                - text: • The most likely cause is a wrong path in
                - code [ref=e225]: claude_desktop_config.json
                - text: . Verify the path to the
                - code [ref=e226]: .exe
                - text: is correct and the file exists at that location.
              - listitem [ref=e227]: • Claude Desktop was not fully quit and relaunched. Use the system tray Quit option, not just the window close button.
              - listitem [ref=e228]: • The config file has a JSON syntax error. Validate it with a JSON linter.
            - paragraph [ref=e229]:
              - strong [ref=e230]: Hammer icon present but tools fail silently
            - list [ref=e231]:
              - listitem [ref=e232]:
                - text: • SQL Server is not running or the connection string is wrong. Start SQL Server and verify the
                - code [ref=e233]: DefaultConnection
                - text: in
                - code [ref=e234]: appsettings.json
                - text: .
              - listitem [ref=e235]:
                - text: • The database has not been migrated. Run
                - code [ref=e236]: dotnet ef database update --project src/HrMcp.McpServer
                - text: once manually.
            - paragraph [ref=e237]:
              - strong [ref=e238]: Garbled output / JSON parse errors in Claude Desktop
            - list [ref=e239]:
              - listitem [ref=e240]:
                - text: • stdout contamination. Something is writing to stdout in stdio mode. Check that
                - code [ref=e241]: "--stdio"
                - text: is in the
                - code [ref=e242]: args
                - text: array in the config and that
                - code [ref=e243]: Program.cs
                - text: is clearing log providers when
                - code [ref=e244]: isStdio
                - text: is true.
              - listitem [ref=e245]:
                - text: • A third-party NuGet package may be writing to stdout during startup. Add
                - code [ref=e246]: Console.SetOut(TextWriter.Null)
                - text: as a last resort after
                - code [ref=e247]: builder.Logging.ClearProviders()
                - text: .
            - paragraph [ref=e248]:
              - code [ref=e249]:
                - strong [ref=e250]: WriteJobDescription
              - strong [ref=e251]: times out or returns empty
            - list [ref=e252]:
              - listitem [ref=e253]:
                - text: • Ollama is not running. Start it with
                - code [ref=e254]: ollama serve
                - text: and confirm
                - code [ref=e255]: llama3.2
                - text: is pulled (
                - code [ref=e256]: ollama list
                - text: ).
